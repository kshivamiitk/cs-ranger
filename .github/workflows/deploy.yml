name: Deploy

# Triggers:
#   - push to main: automatic deploy
#   - workflow_dispatch: manual deploy from the Actions tab (useful for re-runs)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once. If a new push lands mid-deploy, queue it.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Sanity-check secrets
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Don't print values; just confirm they exist and are non-empty.
          [ -n "$DEPLOY_SSH_KEY" ] || { echo "::error::DEPLOY_SSH_KEY is missing"; exit 1; }
          [ -n "$DEPLOY_HOST" ] || { echo "::error::DEPLOY_HOST is missing"; exit 1; }
          [ -n "$DEPLOY_USER" ] || { echo "::error::DEPLOY_USER is missing"; exit 1; }
          echo "✓ DEPLOY_SSH_KEY length: ${#DEPLOY_SSH_KEY}"
          echo "✓ DEPLOY_HOST length:    ${#DEPLOY_HOST}"
          echo "✓ DEPLOY_USER:           $DEPLOY_USER"

      - name: Set up SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Sanity-check the key parsed as a valid OpenSSH key.
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "✓ private key is valid"

      - name: Run deploy.sh on EC2
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # StrictHostKeyChecking=accept-new skips the manual ssh-keyscan dance
          # (which can fail silently if port 22 is blocked from runner IPs).
          # Ensure the server has the latest deploy.sh before invoking it.
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=30 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -e; cd /home/ubuntu/cs-ranger && git fetch --quiet origin main && git reset --hard origin/main && chmod +x deploy.sh && bash deploy.sh"
