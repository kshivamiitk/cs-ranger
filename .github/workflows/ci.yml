name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test, build, audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --no-audit --no-fund

      - name: Install backend dependencies
        run: npm --prefix backend ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit root production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Audit frontend production dependencies
        run: npm --prefix frontend audit --omit=dev --audit-level=high

      - name: Audit backend production dependencies
        run: npm --prefix backend audit --omit=dev --audit-level=high
