name: CI

# Runs entirely without secrets: typechecks, lint, unit tests and the Next.js
# production build all work with no Supabase/Razorpay/Resend credentials
# (the platform falls back to its dev/mock branches).
on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — typecheck, lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit & component tests
        run: npm run test
      - name: Production build
        run: npm run build

  backend:
    name: Backend — typecheck all services, unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck every service workspace
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
